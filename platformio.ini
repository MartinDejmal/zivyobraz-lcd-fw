[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43
build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
  -D ZO_FW_VERSION=\"3.0\"
  -D ZO_API_VERSION=\"3.0\"
  -D ZO_BUILD_DATE=\"${UNIX_TIME}\"
  -D ZO_FEATURE_WIFI=1
  -D ZO_FEATURE_HTTPS=1
  -D ZO_FEATURE_OTA=0
  -D PROTOCOL_WIRE_DEBUG=0
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=240
  -D TFT_MOSI=23
  -D TFT_SCLK=18
  -D TFT_CS=-1
  -D TFT_DC=16
  -D TFT_RST=17
  -D TFT_BL=4
  -D TFT_BACKLIGHT_ON=HIGH
  -D SPI_FREQUENCY=40000000

; Sharp LS027B7DH01 (400x240 B&W Memory-in-Pixel) on ESP32-C3
; Default SPI2 pins: MOSI=GPIO7, SCLK=GPIO6, CS=GPIO10
; Optional DISP pin (display on/off) can be wired to any free GPIO and
; configured at runtime; set to -1 if not connected (always-on).
[env:esp32c3-sharp-ls027b7dh01]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

lib_deps =
  olikraus/U8g2 @ ^2.35.19
  bodmer/TFT_eSPI @ ^2.5.43
build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
  -D ZO_FW_VERSION=\"3.0\"
  -D ZO_API_VERSION=\"3.0\"
  -D ZO_BUILD_DATE=\"${UNIX_TIME}\"
  -D ZO_FEATURE_WIFI=1
  -D ZO_FEATURE_HTTPS=1
  -D ZO_FEATURE_OTA=0
  -D PROTOCOL_WIRE_DEBUG=0
  -D ZO_DISPLAY_SHARP_MIP=1

; LaskaKit ESPD-3.5 (480x320 ILI9488 TFT, 65K colors) on ESP32-S3
; Pin mapping (v3 hardware): MOSI=GPIO11, SCLK=GPIO12, CS=GPIO48, DC=GPIO47,
; RST=-1 (tied to EN), BL=GPIO45
[env:LaskaKit-ESPD-35]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 115200

lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43
build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
  -D ZO_FW_VERSION=\"3.0\"
  -D ZO_API_VERSION=\"3.0\"
  -D ZO_BUILD_DATE=\"${UNIX_TIME}\"
  -D ZO_FEATURE_WIFI=1
  -D ZO_FEATURE_HTTPS=1
  -D ZO_FEATURE_OTA=0
  -D PROTOCOL_WIRE_DEBUG=0
  -D ZO_DISPLAY_ILI9488=1
  -D USER_SETUP_LOADED=1
  -D ILI9488_DRIVER=1
  -D TFT_WIDTH=480
  -D TFT_HEIGHT=320
  -D TFT_MOSI=11
  -D TFT_MISO=13
  -D TFT_SCLK=12
  -D TFT_CS=48
  -D TFT_DC=47
  -D TFT_RST=-1
  -D TFT_BL=45
  -D TFT_BACKLIGHT_ON=HIGH
  -D SPI_FREQUENCY=75000000
